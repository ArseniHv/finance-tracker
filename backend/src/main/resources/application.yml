spring:
  application:
    name: finance-tracker

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financetracker}
    username: ${DB_USER:financetracker}
    password: ${DB_PASS:financetracker}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForDevelopmentOnlyReplaceInProduction123!}
    expiration-ms: 86400000  # 24 hours